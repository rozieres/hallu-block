name: canary

# Live-site drift watch. Runs daily (not on PRs) against the real Google/Bing/
# DDG SERPs + the upstream blocklist. Best-effort: probes skip on consent walls
# and fail only on a definite structural regression. A failure opens an issue.
on:
  schedule:
    - cron: "17 6 * * *" # ~06:17 UTC daily
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  canary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Headless bundled Chromium is enough for DOM probes (no extension load).
      - run: npx playwright install --with-deps chromium

      - run: npm run test:canary

      - name: Open an issue on drift
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "Canary: live-site DOM drift detected ($(date -u +%F))" \
            --body "The daily canary failed — a target site likely changed the DOM our selectors depend on, or the upstream anti-slop blocklist moved. Review and hot-fix docs/rules.json if needed. Run: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" \
            || true
