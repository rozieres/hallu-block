name: e2e

# Deterministic suite (engine + popup, on fixtures). Green is required to merge.
# The packaged-extension e2e.spec tests auto-skip where CLI extension loading is
# blocked (modern Chrome) — engine.spec/popup.spec cover the same logic.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Fast, dependency-free green gate: JSON valid, files present, locales in
      # sync, DEFAULT_TOGGLES aligned, strictly-local invariant holds.
      - run: npm run lint

      # The suite launches real Google Chrome (channel: "chrome") headful, so we
      # install Chrome + system deps and run it under a virtual framebuffer.
      - run: npx playwright install --with-deps chrome

      - run: xvfb-run -a npm test

      # The artifact must be publishable: build it and prove nothing internal leaks.
      - run: npm run build

      - name: Package contains only shippable files
        run: |
          zip=$(ls web-ext-artifacts/*.zip | head -1)
          echo "Inspecting $zip"
          unzip -l "$zip"
          if unzip -l "$zip" | grep -Ei '_reflexion|/tests/|/docs/|\.github|node_modules|package(-lock)?\.json|playwright|scripts/'; then
            echo "::error::Non-shippable files leaked into the package"; exit 1
          fi

      # Runtime deps must be clean (dev-only web-ext vulns are tracked separately).
      - run: npm audit --omit=dev

      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: test-results/
          retention-days: 7
