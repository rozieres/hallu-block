name: e2e

# Deterministic suite (engine + popup, on fixtures). Green is required to merge.
# The packaged-extension e2e.spec tests auto-skip where CLI extension loading is
# blocked (modern Chrome) — engine.spec/popup.spec cover the same logic.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Fast, dependency-free green gate: JSON valid, files present, locales in
      # sync, DEFAULT_TOGGLES aligned, strictly-local invariant holds.
      - run: npm run lint

      # The suite launches real Google Chrome (channel: "chrome") headful, so we
      # install Chrome + system deps and run it under a virtual framebuffer.
      - run: npx playwright install --with-deps chrome

      - run: xvfb-run -a npm test

      # Both store artifacts must be publishable: build them and prove nothing
      # internal leaks. Firefox's manifest is derived from the Chrome canonical.
      - run: npm run build
      - run: npm run build:firefox

      # The Firefox package must also pass web-ext's own validator (0 errors).
      # (The Chrome target's `lint:webext` fails by design — see the script.)
      - run: npm run lint:firefox

      - name: Packages contain only shippable files
        run: |
          # Positive allowlist (not a denylist of known-bad names): every archived
          # entry must be manifest.json or live under _locales/ or src/. Anything
          # else — docs, tests, scripts, node_modules, a stray package.json — fails.
          for zip in web-ext-artifacts/*.zip; do
            echo "Inspecting $zip"
            unzip -l "$zip"
            bad=$(unzip -Z1 "$zip" | grep -vE '^(manifest\.json|_locales/|src/)' || true)
            if [ -n "$bad" ]; then
              echo "::error::Non-shippable entries leaked into $zip:"
              echo "$bad"
              exit 1
            fi
          done

      # Runtime deps must be clean (dev-only web-ext vulns are tracked separately).
      - run: npm audit --omit=dev

      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: test-results/
          retention-days: 7
